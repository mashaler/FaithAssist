<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contact FaithAssist</title><link rel="stylesheet" href="css/style.css"></head>
<body>
  <nav class="navbar">...</nav>
  <main class="container">
    <h1>Contact Us</h1>
    <p>Have questions, prayer requests, or feedback? We'd love to hear from you.</p>
    <div class="tool-card">
      <h2>Send a Message</h2>
      <form action="https://formsubmit.co/your-email@example.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="email" name="email" placeholder="Your Email" required><br>
        <textarea name="message" rows="5" placeholder="Your message or prayer request..." required></textarea><br>
        <button type="submit">Send Message →</button>
      </form>
    </div>
    <div class="support-box"><p>🙏 <strong>Prayer Request?</strong> We'd be honored to pray for you.</p></div>
  </main>
  <footer>...</footer>
</body>
</html>
